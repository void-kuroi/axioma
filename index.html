<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AXIOMA | Hardware Engine v1.0 [3D_REAL]</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Jost:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="engine-style.css">
</head>
<body>

    <div id="preloader">
        <div class="term-text" id="term-text"></div>
        <div class="start-btn blink" id="start-btn">[ INICIAR MOTOR_3D ]</div>
    </div>

    <div id="cursor-ghost-container"></div>
    <div id="cursor-x-glitch"><span class="c1">X</span><span class="c2">X</span></div>

    <div id="app-container">
        
        <aside id="control-panel">
            <div class="panel-header control-module">
                <h1 class="logo">AXIOMA // ENGINE</h1>
                <p class="version">v1.0.0 [WEBGL_BUILD]</p>
            </div>

            <div class="control-module">
                <label>[00] _SELECCIÓN_HARDWARE</label>
                <select id="hardware-select" class="axioma-input interactive-sound">
                    <optgroup label="Generación 17">
                        <option value="ip17pm">iPhone 17 Pro Max</option>
                        <option value="ip17pro">iPhone 17 Pro</option>
                        <option value="ip17air">iPhone 17 Air [SLIM_MODULE]</option>
                        <option value="ip17std">iPhone 17 Standard</option>
                    </optgroup>
                    <optgroup label="Generación 16">
                        <option value="ip16pm">iPhone 16 Pro Max</option>
                        <option value="ip16std">iPhone 16 Standard [VERT_CAM]</option>
                    </optgroup>
                </select>
            </div>

            <div class="control-module">
                <label>[01] _MATERIAL_BASE (MATE)</label>
                <div class="color-picker-grid">
                    <div class="color-picker-dot interactive-sound active" style="background: #1C1E22;" data-color-hex="#1C1E22" title="Negro Pizarra"></div>
                    <div class="color-picker-dot interactive-sound" style="background: #F5F4F0;" data-color-hex="#F5F4F0" title="Blanco Hueso"></div>
                    <div class="color-picker-dot interactive-sound" style="background: #8B8D91;" data-color-hex="#8B8D91" title="Gris Código"></div>
                    <div class="color-picker-dot interactive-sound" style="background: #FF0004;" data-color-hex="#FF0004" title="Rojo Axioma"></div>
                </div>
            </div>

            <div class="control-module">
                <label>[02] _MÓDULO_CÁMARA</label>
                <div class="btn-group">
                    <button class="finish-selector-btn interactive-sound axioma-btn" data-target="camera-bump" data-finish="#E6E5E1">Plata Metálico</button>
                    <button class="finish-selector-btn interactive-sound axioma-btn" data-target="camera-bump" data-finish="#111111">Titanio Void</button>
                </div>
            </div>

            <div class="control-module">
                <label>[05] _MAPEO_UV (TEXTURA ÚNICA)</label>
                <button id="upload-graphic-btn" class="interactive-sound axioma-btn action-red">[+] INYECTAR_GRÁFICO (JPG/PNG)</button>
                <input type="file" id="graphic-upload-input" accept="image/png, image/jpeg" style="display: none;">
            </div>

            <div class="system-status-box control-module">
                <p id="engine-status">> ESPERANDO INSTRUCCIONES...</p>
            </div>
        </aside>

        <main id="render-stage">
            <div id="audio-toggle" class="interactive-sound control-btn corner-btn">[ SOUND: ON ]</div>
            </main>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script src="axioma-engine.js"></script>
</body>
</html>
